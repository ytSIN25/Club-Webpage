<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — CSSC</title>
  <meta name="description" content="Sign in to your CSSC account to access events, resources, and your profile." />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/jpeg" href="favicon.png">
</head>
<body>
  <script src="shared.js"></script>

  <!-- Background Orbs -->
  <div style="position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;">
    <div style="position:absolute;width:500px;height:500px;top:-150px;left:-150px;background:radial-gradient(circle,rgba(124,58,237,0.2),transparent 70%);"></div>
    <div style="position:absolute;width:400px;height:400px;bottom:-100px;right:-100px;background:radial-gradient(circle,rgba(6,182,212,0.15),transparent 70%);"></div>
  </div>

  <div class="auth-page">
    <div class="auth-card animate-fade-up" style="position:relative;z-index:2;">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon">💻</div>
        <div class="auth-logo-text">CSSC<span class="text-purple">.</span></div>
      </div>

      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your account to continue</p>

      <!-- Alert -->
      <div class="alert alert-error hidden" id="loginAlert">
        <span>⚠</span> <span id="loginAlertMsg"></span>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email Address</label>
          <input
            type="email"
            id="loginEmail"
            class="form-input"
            placeholder="you@university.edu"
            autocomplete="email"
            required
          />
          <div class="form-error" id="emailError">Please enter a valid email.</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">
            <span>Password</span>
          </label>
          <div style="position:relative;">
            <input
              type="password"
              id="loginPassword"
              class="form-input"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
              style="padding-right:48px;"
            />
            <button type="button" id="togglePwd" onclick="togglePassword()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:1rem;">👁</button>
          </div>
          <div class="form-error" id="pwdError">Please enter your password.</div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg mt-8" id="loginBtn">
          Sign In →
        </button>
      </form>

      <div class="auth-divider">or</div>

      <div class="auth-footer">
        Don't have an account? <a href="register.html" id="goToRegister">Join CSSC →</a>
      </div>

      <div class="auth-footer mt-8" style="margin-top:12px;">
        <small class="text-muted">Demo Admin: admin@cssc.edu / admin123</small>
      </div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = 'home.html';

    function togglePassword() {
      const input = document.getElementById('loginPassword');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function showAlert(msg) {
      document.getElementById('loginAlert').classList.remove('hidden');
      document.getElementById('loginAlertMsg').textContent = msg;
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');

      // Validate
      let valid = true;
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('emailError').classList.add('show');
        document.getElementById('loginEmail').classList.add('error');
        valid = false;
      } else {
        document.getElementById('emailError').classList.remove('show');
        document.getElementById('loginEmail').classList.remove('error');
      }

      if (!password) {
        document.getElementById('pwdError').classList.add('show');
        document.getElementById('loginPassword').classList.add('error');
        valid = false;
      } else {
        document.getElementById('pwdError').classList.remove('show');
        document.getElementById('loginPassword').classList.remove('error');
      }

      if (!valid) return;

      // Simulate loading
      btn.innerHTML = '<div class="spinner"></div> Signing in...';
      btn.disabled = true;

      setTimeout(() => {
        const user = Users.find(email);
        if (!user) {
          showAlert('No account found with that email. Please register first.');
          btn.innerHTML = 'Sign In →';
          btn.disabled = false;
          return;
        }
        if (user.password !== password) {
          showAlert('Incorrect password. Please try again.');
          btn.innerHTML = 'Sign In →';
          btn.disabled = false;
          return;
        }
        Auth.setUser(user);
        Toast.show('Welcome back, ' + user.name.split(' ')[0] + '!', 'success');
        setTimeout(() => window.location.href = 'home.html', 500);
      }, 800);
    });
  </script>
</body>
</html>
