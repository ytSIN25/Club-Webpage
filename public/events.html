<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Hub — CSSC</title>
  <meta name="description" content="Browse and register for upcoming CSSC events — workshops, hackathons, talks, and more." />
  <link rel="stylesheet" href="style.css" />
  <style>
    .filters-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 36px;
      padding: 16px 20px;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--border-radius);
    }

    .filter-btn {
      padding: 7px 16px;
      border-radius: 100px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--glass-border);
      background: transparent;
      color: var(--text-secondary);
      transition: var(--transition);
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--purple);
      border-color: var(--purple);
      color: white;
    }

    .search-input-wrap {
      flex: 1;
      max-width: 300px;
      position: relative;
    }

    .search-input-wrap input {
      width: 100%;
      padding: 9px 16px 9px 36px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      color: var(--text-primary);
      font-size: 0.875rem;
      outline: none;
      transition: var(--transition);
    }

    .search-input-wrap input:focus {
      border-color: var(--purple);
      background: rgba(124,58,237,0.08);
    }

    .search-input-wrap::before {
      content: '🔍';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.8rem;
      pointer-events: none;
    }

    .event-card {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--border-radius-lg);
      overflow: hidden;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
    }

    .event-card:hover {
      border-color: rgba(124,58,237,0.35);
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 30px rgba(124,58,237,0.1);
    }

    .event-card-header {
      height: 160px;
      background: var(--gradient-card);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .event-card-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(124,58,237,0.3), transparent 60%);
    }

    .event-card-icon { font-size: 3.5rem; position: relative; z-index: 1; }

    .event-card-date-chip {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(8,8,16,0.85);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 6px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--cyan-light);
      z-index: 1;
    }

    .event-card-body {
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .event-card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .event-card-meta {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 14px;
    }

    .event-meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    .event-meta-icon { width: 16px; text-align: center; opacity: 0.7; }

    .event-card-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .event-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-top: 14px;
      border-top: 1px solid var(--glass-border);
    }

    .capacity-bar {
      flex: 1;
    }

    .capacity-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }

    .capacity-track {
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .capacity-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--gradient-primary);
    }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .section-toggle {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .section-toggle-btn {
      padding: 10px 24px;
      border-radius: 100px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      transition: var(--transition);
      background: transparent;
      color: var(--text-muted);
    }

    .section-toggle-btn.active {
      background: var(--gradient-primary);
      color: white;
      box-shadow: 0 4px 15px var(--purple-glow);
    }

    @media (max-width: 600px) {
      .events-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <script src="shared.js"></script>
  <script>
    Auth.requireAuth();
    buildNav('events');
  </script>

  <div class="page-wrapper">
    <div class="container" style="padding-top:40px;padding-bottom:80px;">

      <!-- Header -->
      <div class="page-hero" style="text-align:left;padding:40px 0 32px;">
        <div class="section-label">// discover & join</div>
        <h1 class="page-hero-title">Event <span class="text-gradient">Hub</span></h1>
        <p class="page-hero-subtitle">Browse all upcoming events, workshops, and competitions — and register your spot.</p>
      </div>

      <!-- Section Toggle -->
      <div class="section-toggle">
        <button class="section-toggle-btn active" id="toggleUpcoming" onclick="showTab('upcoming')">🔥 Upcoming</button>
        <button class="section-toggle-btn" id="togglePast" onclick="showTab('past')">📚 Past Events</button>
      </div>

      <!-- Filters -->
      <div class="filters-bar">
        <div class="search-input-wrap">
          <input type="text" id="searchInput" placeholder="Search events..." oninput="filterEvents()" />
        </div>
        <button class="filter-btn active" onclick="setFilter('All', this)">All</button>
        <button class="filter-btn" onclick="setFilter('Competition', this)">🏆 Competition</button>
        <button class="filter-btn" onclick="setFilter('Workshop', this)">🛠 Workshop</button>
        <button class="filter-btn" onclick="setFilter('Talk', this)">🎤 Talk</button>
        <button class="filter-btn" onclick="setFilter('Study Group', this)">📖 Study Group</button>
        <button class="filter-btn" onclick="setFilter('Social', this)">🎉 Social</button>
      </div>

      <!-- Events Grid -->
      <div id="eventsContainer">
        <div class="events-grid" id="eventsGrid">
          <div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-muted);">Loading events...</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const user = Auth.getCurrentUser();
    let currentTab = 'upcoming';
    let currentFilter = 'All';

    function getCategoryIcon(cat) {
      const icons = {
        'Competition': '🏆', 'Workshop': '🛠', 'Talk': '🎤',
        'Study Group': '📖', 'Social': '🎉'
      };
      return icons[cat] || '📅';
    }

    function renderEvents() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const all = Events.getAll();
      const filtered = all.filter(ev => {
        const matchTab = currentTab === 'upcoming' ? !ev.isPast : ev.isPast;
        const matchCat = currentFilter === 'All' || ev.category === currentFilter;
        const matchSearch = !query || ev.title.toLowerCase().includes(query) || ev.description.toLowerCase().includes(query) || ev.tags?.some(t => t.includes(query));
        return matchTab && matchCat && matchSearch;
      });

      const grid = document.getElementById('eventsGrid');

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text-muted);">
            <div style="font-size:3rem;margin-bottom:16px;">🔍</div>
            <div style="font-size:1.1rem;margin-bottom:8px;color:var(--text-secondary);">No events found</div>
            <div style="font-size:0.9rem;">Try a different filter or search term.</div>
          </div>
        `;
        return;
      }

      grid.innerHTML = filtered.map(ev => {
        const attended = (ev.attendees || []).length;
        const pct = ev.capacity ? Math.min(100, (attended / ev.capacity) * 100) : 0;
        const isJoined = (user.joinedActivities || []).includes(ev.id);
        const isFull = ev.capacity && attended >= ev.capacity;

        return `
          <div class="event-card scroll-reveal" id="card-${ev.id}">
            <div class="event-card-header">
              <div class="event-card-icon">${getCategoryIcon(ev.category)}</div>
              <div class="event-card-date-chip">${formatDate(ev.date)}</div>
              ${ev.isPast ? '<div style="position:absolute;top:12px;left:12px;z-index:1;"><span class="badge badge-green">Completed</span></div>' : ''}
            </div>
            <div class="event-card-body">
              <div style="margin-bottom:10px;">
                <span class="badge ${getCategoryBadgeClass(ev.category)}">${ev.category}</span>
              </div>
              <h3 class="event-card-title">${ev.title}</h3>
              <div class="event-card-meta">
                <div class="event-meta-item"><span class="event-meta-icon">🕐</span>${formatTime(ev.time)}</div>
                <div class="event-meta-item"><span class="event-meta-icon">📍</span>${ev.location}</div>
                ${ev.tags ? `<div class="event-meta-item"><span class="event-meta-icon">🏷</span>${ev.tags.slice(0,2).join(', ')}</div>` : ''}
              </div>
              <p class="event-card-desc">${ev.description}</p>
              <div class="event-card-footer">
                <div class="capacity-bar">
                  <div class="capacity-label">
                    <span>${attended} attending</span>
                    ${ev.capacity ? `<span>${ev.capacity - attended} spots left</span>` : ''}
                  </div>
                  ${ev.capacity ? `<div class="capacity-track"><div class="capacity-fill" style="width:${pct}%"></div></div>` : ''}
                </div>
                <div style="display:flex;gap:8px;margin-left:12px;">
                  <a href="event-detail.html?id=${ev.id}" class="btn btn-secondary btn-sm">Details</a>
                  ${!ev.isPast ? (isJoined
                    ? `<button class="btn btn-outline btn-sm" onclick="leaveEvent('${ev.id}')" id="joinBtn-${ev.id}">✓ Joined</button>`
                    : (isFull
                      ? `<button class="btn btn-secondary btn-sm" disabled>Full</button>`
                      : `<button class="btn btn-primary btn-sm" onclick="joinEvent('${ev.id}')" id="joinBtn-${ev.id}">Join →</button>`
                    )
                  ) : ''}
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      initScrollAnimations();
    }

    function showTab(tab) {
      currentTab = tab;
      document.getElementById('toggleUpcoming').classList.toggle('active', tab === 'upcoming');
      document.getElementById('togglePast').classList.toggle('active', tab === 'past');
      renderEvents();
    }

    function setFilter(cat, btn) {
      currentFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderEvents();
    }

    function filterEvents() { renderEvents(); }

    function joinEvent(eventId) {
      Events.joinEvent(eventId, user.email);
      Toast.show('You\'ve registered for this event! 🎉', 'success');
      // Reload user
      const updated = Users.find(user.email);
      Auth.setUser(updated);
      renderEvents();
    }

    function leaveEvent(eventId) {
      if (confirm('Are you sure you want to leave this event?')) {
        Events.leaveEvent(eventId, user.email);
        Toast.show('You\'ve unregistered from the event.', 'info');
        const updated = Users.find(user.email);
        Auth.setUser(updated);
        renderEvents();
      }
    }

    renderEvents();
  </script>

  <script>buildFooter();</script>
</body>
</html>
